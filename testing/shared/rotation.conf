# testing/shared/rotation.conf
# Sequencer configuration — edit ROTATION to change agent weights
# The sequencer re-reads this file each iteration, so changes take effect
# within one cycle without restarting anything.

# Weighted rotation: smoketest=2, edgecase=2, chaos=1
# Agents are dispatched in this order, repeating cyclically
ROTATION=smoketest,edgecase,smoketest,edgecase,chaos

# Seconds to wait after dispatching before checking for completion
# This is the minimum gap between agent runs
SLOT_INTERVAL=300

# Seconds before a held lock is considered stale and force-cleared
LOCK_TIMEOUT=720

# Lock file path (shared with agents and teardown hook)
LOCK_FILE=/tmp/flare-extension-testing.lock

# Sequencer state file (tracks current position in rotation)
STATE_FILE=/tmp/flare-sequencer-state
